version: "3.8"

services:
  db:
    image: postgres:15
    container_name: grao_amor_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grao_amor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: grao_amor_api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/grao_amor
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
